name: Update Rates

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora automáticamente
  workflow_dispatch:      # Permite ejecutarlo manualmente cuando quieras

jobs:
  update:
    runs-on: ubuntu-latest
    
    # Esta variable elimina el aviso de "Node.js 20 is deprecated"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add .
          # Solo hace commit si hubo cambios reales en los precios
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update rates: $(date)" && git push)
